<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d9488" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Neo4j Viewer</title>
    <script type="module" crossorigin src="/assets/index-BGoAdqY1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DKrfp-Hf.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- iOS Safari のピンチ・ダブルタップズーム防止 -->
    <!-- user-scalable=no は iOS 10以降無視されるため JS で対処 -->
    <script>
      // ピンチジェスチャー防止（Safari独自イベント）
      ['gesturestart','gesturechange','gestureend'].forEach(function(t){
        document.addEventListener(t, function(e){ e.preventDefault(); }, { passive: false });
      });
      // ダブルタップによるズームを防止（最終手段：300ms以内の連続タップを検知して preventDefault）
      var lastTap = 0;
      document.addEventListener('touchend', function(e) {
        // canvas要素は独自zoom処理があるのでスキップ
        if (e.target && e.target.tagName === 'CANVAS') return;
        var now = Date.now();
        if (now - lastTap < 300) {
          e.preventDefault();
        }
        lastTap = now;
      }, { passive: false });
    </script>
  </body>
</html>
